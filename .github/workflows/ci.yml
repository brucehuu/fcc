name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - run: go mod download

      - run: go test ./...

  build:
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags "-X main.version=$VERSION" -o fcc-darwin-arm64 .

      - uses: actions/upload-artifact@v4
        with:
          name: fcc-darwin-arm64
          path: fcc-darwin-arm64
          retention-days: 7

  release:
    runs-on: macos-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build release binary
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go build -ldflags "-X main.version=$VERSION" -o fcc-darwin-arm64 .
          shasum -a 256 fcc-darwin-arm64 > fcc-darwin-arm64.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            fcc-darwin-arm64
            fcc-darwin-arm64.sha256
            install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
